<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Pixel Photo Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --win-bg: #008080; /* Warna hijau teal khas Windows 95 */
            --win-gray: #c0c0c0;
            --win-dark-gray: #808080;
            --win-blue: #000080;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'VT323', monospace;
            background-color: #000;
        }

        /* --- 1. HALAMAN PEMBUKA DUAL BOOT (SPLASH SCREEN) --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1f1147 0%, #050212 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        #splash-screen.hidden {
            opacity: 0;
            transform: scale(1.1);
            pointer-events: none;
        }

        .pixel-tv {
            background: #3a3a3a;
            border: 8px solid #222;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 0 8px #555, 0 15px 0 #111;
            text-align: center;
            width: 90%;
            max-width: 480px;
            position: relative;
        }

        .tv-screen {
            background: #0a0a0a;
            border: 4px solid #000;
            padding: 25px 15px;
            border-radius: 8px;
            box-shadow: inset 0 0 30px rgba(0, 243, 255, 0.1);
        }

        .system-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            color: #00ffcc;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(0, 255, 204, 0.5);
        }

        .boot-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .boot-btn {
            font-family: 'Press Start 2P', cursive;
            font-size: 11px;
            background: #222;
            color: #fff;
            border: 3px solid #444;
            padding: 12px 10px;
            cursor: pointer;
            text-transform: uppercase;
            text-align: left;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .boot-btn.mode-win:hover {
            background: #000080;
            border-color: #00ffff;
            color: #fff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.4);
        }

        .boot-btn.mode-cyber:hover {
            background: #ff007f;
            border-color: #00f3ff;
            color: #fff;
            box-shadow: 0 0 12px rgba(255, 0, 127, 0.6);
        }

        .boot-btn span.key {
            color: #ffcc00;
        }

        .please-wait {
            font-size: 20px;
            color: #888;
            margin-top: 25px;
            letter-spacing: 2px;
        }

        /* --- 2. HALAMAN UTAMA DESKTOP (WINDOWS 95) --- */
        #desktop {
            width: 100%;
            height: 100%;
            background-color: var(--win-bg);
            padding: 20px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-content: flex-start;
            flex-wrap: wrap;
            gap: 30px;
        }

        .folder-icon {
            width: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            text-align: center;
            z-index: 5;
        }

        .folder-sprite {
            width: 50px;
            height: 40px;
            background: #f4d03f;
            position: relative;
            border-radius: 0 5px 5px 5px;
            box-shadow: 2px 2px 0 #000;
        }

        .folder-sprite::before {
            content: '';
            position: absolute;
            top: -8px; left: 0;
            width: 20px; height: 8px;
            background: #f1c40f;
            border-radius: 3px 3px 0 0;
        }

        .folder-name {
            margin-top: 8px;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            background: rgba(0,0,0,0.3);
            padding: 2px 6px;
            border-radius: 3px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- JENDELA POP-UP WINDOWS 95 --- */
        .window {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 550px;
            background: var(--win-gray);
            border: 3px solid;
            border-color: #fff var(--win-dark-gray) var(--win-dark-gray) #fff;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            display: none;
            flex-direction: column;
            z-index: 100;
        }

        .window-header {
            background: var(--win-blue);
            color: white;
            padding: 6px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
        }

        .close-btn {
            background: var(--win-gray);
            border: 2px solid;
            border-color: #fff var(--win-dark-gray) var(--win-dark-gray) #fff;
            width: 22px;
            height: 22px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .window-menu {
            display: flex;
            gap: 15px;
            padding: 4px 10px;
            border-bottom: 2px solid var(--win-dark-gray);
            font-size: 16px;
        }

        .window-body {
            padding: 15px;
            background: #fff;
            margin: 4px;
            border: 2px solid inset;
            border-color: var(--win-dark-gray) #fff #fff var(--win-dark-gray);
            min-height: 250px;
            max-height: 400px;
            overflow-y: auto;
        }

        /* Grid Foto */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
        }

        .photo-item {
            border: 2px solid var(--win-gray);
            background: #000;
            height: 120px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .photo-item:hover {
            transform: scale(1.05);
            outline: 2px dashed var(--win-blue);
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- LIGHTBOX POP-UP GAMBAR --- */
        .lightbox-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .lightbox-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox-window {
            background: var(--win-gray);
            border: 3px solid;
            border-color: #fff var(--win-dark-gray) var(--win-dark-gray) #fff;
            padding: 4px;
            max-width: 90%;
            max-height: 80%;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.8);
            transform: scale(0.7);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
        }

        .lightbox-overlay.active .lightbox-window {
            transform: scale(1);
        }

        .lightbox-content {
            border: 2px solid inset;
            border-color: var(--win-dark-gray) #fff #fff var(--win-dark-gray);
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .lightbox-window img {
            max-width: 100%;
            max-height: 65vh;
            object-fit: contain;
            display: block;
        }

        /* --- START MENU POP-UP --- */
        .start-menu {
            position: fixed;
            bottom: 40px;
            left: 2px;
            width: 200px;
            background: var(--win-gray);
            border: 3px solid;
            border-color: #fff var(--win-dark-gray) var(--win-dark-gray) #fff;
            box-shadow: 3px 3px 12px rgba(0,0,0,0.6);
            display: none;
            flex-direction: column;
            z-index: 999;
        }

        .start-menu.active {
            display: flex;
        }

        .start-menu-sidebar {
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 25px;
            background: linear-gradient(to top, var(--win-blue), #0000ff);
            color: #fff;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            font-family: 'Press Start 2P', cursive;
            font-size: 11px;
            padding-bottom: 10px;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
        }

        .start-menu-list {
            margin-left: 25px;
            display: flex;
            flex-direction: column;
        }

        .start-menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            color: #000;
            font-size: 18px;
            cursor: pointer;
            text-decoration: none;
        }

        .start-menu-item:hover {
            background: var(--win-blue);
            color: #fff;
        }

        .start-menu-item i {
            font-size: 16px;
            width: 20px;
            text-align: center;
        }

        .start-menu-divider {
            height: 2px;
            background: var(--win-dark-gray);
            border-bottom: 1px solid #fff;
            margin: 3px 0 3px 25px;
        }

        /* --- BARISAN TASKBAR BAWAH --- */
        .taskbar {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            height: 40px;
            background: var(--win-gray);
            border-top: 3px solid #fff;
            display: flex;
            align-items: center;
            padding: 0 5px;
            justify-content: space-between;
            z-index: 1000;
        }

        .start-menu-btn {
            background: var(--win-gray);
            border: 2px solid;
            border-color: #fff var(--win-dark-gray) var(--win-dark-gray) #fff;
            padding: 2px 10px;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .start-menu-btn:active, .start-menu-btn.active {
            border-color: var(--win-dark-gray) #fff #fff var(--win-dark-gray);
            padding: 3px 9px 1px 11px;
        }

        .clock {
            border: 2px solid;
            border-color: var(--win-dark-gray) #fff #fff var(--win-dark-gray);
            padding: 2px 10px;
            font-size: 16px;
            background: var(--win-gray);
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="pixel-tv">
            <div class="tv-screen">
                <div class="system-title">Select Boot Mode:</div>
                <div class="boot-options">
                    <button class="boot-btn mode-win" onclick="bootToWindows()">
                        <span class="key">[1]</span> Windows 95 Mode
                    </button>
                    <button class="boot-btn mode-cyber" onclick="bootToCyberpunk()">
                        <span class="key">[2]</span> Cyberpunk Mode
                    </button>
                </div>
            </div>
        </div>
        <div class="please-wait">Awaiting connection input...</div>
    </div>

    <div id="desktop" onclick="closeStartMenu()">
        
        <div class="folder-icon" onclick="event.stopPropagation(); openFolder('camera')">
            <div class="folder-sprite"></div>
            <div class="folder-name">Camera</div>
        </div>

        <div class="folder-icon" onclick="event.stopPropagation(); openFolder('wisuda')">
            <div class="folder-sprite"></div>
            <div class="folder-name">Wisuda</div>
        </div>

        <div class="folder-icon" onclick="event.stopPropagation(); openFolder('kucing')">
            <div class="folder-sprite"></div>
            <div class="folder-name">Kucing</div>
        </div>

    </div>

    <div class="start-menu" id="startMenu">
        <div class="start-menu-sidebar">WIN95</div>
        <div class="start-menu-list">
            <div class="start-menu-item" onclick="openFolder('camera')">
                <i class="fa-solid fa-images" style="color: #ff5722;"></i>
                <span>My Photos</span>
            </div>
            <div class="start-menu-divider"></div>
            <div class="start-menu-item" onclick="location.reload();">
                <i class="fa-solid fa-power-off" style="color: #e91e63;"></i>
                <span>Restart Gateway</span>
            </div>
        </div>
    </div>

    <div class="window" id="galleryWindow">
        <div class="window-header">
            <span id="windowTitle">folder.exe</span>
            <button class="close-btn" onclick="closeFolder()">X</button>
        </div>
        <div class="window-menu">
            <span>File</span>
            <span>Edit</span>
            <span>View</span>
            <span>Options</span>
        </div>
        <div class="window-body">
            <div class="photo-grid" id="photoGridContent"></div>
        </div>
    </div>

    <div class="lightbox-overlay" id="lightbox" onclick="closeLightbox()">
        <div class="lightbox-window" onclick="event.stopPropagation()">
            <div class="window-header">
                <span>image_viewer.exe</span>
                <button class="close-btn" onclick="closeLightbox()">X</button>
            </div>
            <div class="lightbox-content">
                <img id="lightboxImg" src="" alt="Zoomed View">
            </div>
        </div>
    </div>

    <div class="taskbar">
        <button class="start-menu-btn" id="startBtn" onclick="toggleStartMenu(event)">
            <i class="fa-solid fa-folder-open" style="color: #616161;"></i> 
            <span>Start</span>
        </button>
        <div class="clock" id="liveClock">12:00 PM</div>
    </div>

    <script>
        // --- DUAL BOOT GATEWAY ---
        function bootToWindows() {
            document.getElementById('splash-screen').classList.add('hidden');
        }

        function bootToCyberpunk() {
            document.body.style.cursor = 'wait';
            document.querySelector('.please-wait').textContent = 'Redirecting to Matrix...';
            setTimeout(() => {
                window.location.href = '2/cyber/index.html';
            }, 500);
        }

        // --- KONTROL START MENU ---
        function toggleStartMenu(event) {
            event.stopPropagation();
            const menu = document.getElementById('startMenu');
            const btn = document.getElementById('startBtn');
            menu.classList.toggle('active');
            btn.classList.toggle('active');
        }

        function closeStartMenu() {
            document.getElementById('startMenu').classList.remove('active');
            document.getElementById('startBtn').classList.remove('active');
        }

        // --- KONTROL MUAT GAMBAR URUTAN OTOMATIS (CARA 2) ---
        function openFolder(folderName) {
            closeStartMenu();
            const win = document.getElementById('galleryWindow');
            const title = document.getElementById('windowTitle');
            const grid = document.getElementById('photoGridContent');
            
            title.textContent = `${folderName.toUpperCase()}.EXE`;
            grid.innerHTML = ''; // Reset isi grid jendela sebelumnya
            win.style.display = 'flex';

            let fileIndex = 1; // Mulai mendeteksi dari file nomor 1
            
            function tryLoadImage() {
                // Mendeteksi format gambar secara berurutan: camera/1.jpg, camera/2.jpg, dst.
                const imgUrl = `${folderName}/${fileIndex}.jpg`; 
                const img = new Image();
                
                img.onload = function() {
                    // Jika gambar 1.jpg ada/berhasil dipanggil, render ke grid
                    const photoItem = document.createElement('div');
                    photoItem.className = 'photo-item';
                    photoItem.innerHTML = `<img src="${imgUrl}" alt="Foto ${fileIndex}">`;
                    
                    photoItem.onclick = function() { 
                        openLightbox(imgUrl); 
                    };
                    
                    grid.appendChild(photoItem);
                    
                    // Lanjut memanggil file urutan berikutnya (2.jpg, 3.jpg, dan seterusnya)
                    fileIndex++;
                    tryLoadImage();
                };
                
                img.onerror = function() {
                    // Ketika sistem mendeteksi eror 404 (file sudah habis/mentok), pencarian otomatis berhenti
                    if (fileIndex === 1) {
                        grid.innerHTML = '<div style="padding:10px; color:#000; font-size:18px;">Tidak ada gambar bernama 1.jpg di folder ini.</div>';
                    }
                };
                
                img.src = imgUrl;
            }

            tryLoadImage(); // Mulai eksekusi pencarian loop gambar
        }

        function closeFolder() {
            document.getElementById('galleryWindow').style.display = 'none';
        }

        // --- KONTROL LIGHTBOX GAMBAR ---
        function openLightbox(url) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightboxImg');
            lightboxImg.src = url;
            lightbox.classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        // Jam Taskbar
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12;
            document.getElementById('liveClock').textContent = `${hours}:${minutes} ${ampm}`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    
    <script src="assets/gallery.js"></script>
</body>
</html>
